<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vale Feira</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

header {
  background: #16a34a;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin: 10px;
}

input {
  width: 90%;
  padding: 14px;
  margin: 8px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

button {
  width: 90%;
  padding: 15px;
  margin: 8px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  font-weight: bold;
}

.btn-scan {
  background: #2563eb;
  color: white;
}

.btn-feirante {
  background: #9333ea;
  color: white;
}

.btn-pagar {
  background: #22c55e;
  color: white;
  font-size: 18px;
}

#reader {
  width: 100%;
  max-width: 300px;
  margin: auto;
  display: none;
}

#msg {
  margin: 10px;
  font-weight: bold;
}
</style>

</head>

<body>

<header>💳 Vale Feira</header>

<div class="container">

  <button class="btn-scan" onclick="lerServidor()">📷 Ler QR Servidor</button>
  <button class="btn-feirante" onclick="lerFeirante()">🏪 Ler QR Feirante</button>

  <div id="reader"></div>

  <div class="card">
    <input type="text" id="servidor" placeholder="Servidor" readonly>
    <input type="text" id="nome" placeholder="Nome" readonly>
    <input type="text" id="feirante" placeholder="Feirante" readonly>
    <input type="number" id="valor" placeholder="Valor (R$)">
  </div>

  <button class="btn-pagar" onclick="pagar()">CONFIRMAR PAGAMENTO</button>

  <div id="msg"></div>

</div>

<audio id="ok" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="erro" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

const API = "https://script.google.com/macros/s/AKfycbyJCYnf7AmIcu48kNYum37p4h0fcCy23lh16X1PHfTI4mq8ErulRSV1fOWs164JReFz/exec";

let qr;
let modo = "";

// mensagens
function setMsg(msg, cor="white") {
  let el = document.getElementById("msg");
  el.innerText = msg;
  el.style.color = cor;
}

function somOK() {
  document.getElementById("ok").play();
}

function somErro() {
  document.getElementById("erro").play();
}

// abrir câmera
function abrirCamera(callback) {

  document.getElementById("reader").style.display = "block";

  qr = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(cameras => {

    let traseira = cameras.find(c => c.label.toLowerCase().includes("back"));
    let cameraId = traseira ? traseira.id : cameras[0].id;

    qr.start(cameraId, { fps: 10, qrbox: 250 }, callback);

  }).catch(() => {
    setMsg("Erro ao abrir câmera", "red");
  });
}

// 📌 LER SERVIDOR
function lerServidor() {

  modo = "servidor";

  abrirCamera((decodedText) => {

    qr.stop();

    let servidor = decodedText;

    if (decodedText.includes("servidor=")) {
      servidor = decodedText.split("servidor=")[1];
    }

    document.getElementById("servidor").value = servidor;

    setMsg("Consultando...", "#38bdf8");

    fetch(API + "?servidor=" + encodeURIComponent(servidor))
      .then(r => r.json())
      .then(data => {

        if (data.erro) {
          setMsg(data.erro, "red");
          somErro();
          return;
        }

        document.getElementById("nome").value = data.nome;

        setMsg("Saldo: R$ " + data.saldo, "#22c55e");
        somOK();

      });
  });
}

// 📌 LER FEIRANTE
function lerFeirante() {

  modo = "feirante";

  abrirCamera((decodedText) => {

    qr.stop();

    let feirante = decodedText;

    document.getElementById("feirante").value = feirante;

    setMsg("Feirante lido com sucesso", "#22c55e");
    somOK();

  });
}

// 💳 PAGAMENTO
function pagar() {

  let servidor = document.getElementById("servidor").value;
  let valor = document.getElementById("valor").value;
  let feirante = document.getElementById("feirante").value;

  if (!servidor) return alert("Leia o QR do servidor");
  if (!feirante) return alert("Leia o QR do feirante");
  if (!valor || valor <= 0) return alert("Informe o valor");

  setMsg("Processando...", "#38bdf8");

  fetch(API + "?servidor=" + servidor +
        "&valor=" + valor +
        "&feirante=" + encodeURIComponent(feirante))
    .then(r => r.json())
    .then(data => {

      if (data.erro) {
        setMsg(data.erro, "red");
        somErro();
        return;
      }

      setMsg("✅ Pagamento realizado | Saldo: R$ " + data.saldo, "#22c55e");
      somOK();

      document.getElementById("valor").value = "";

    })
    .catch(() => {
      setMsg("Erro ao processar", "red");
      somErro();
    });
}

</script>

</body>
</html>
