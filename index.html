<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Vale Feira</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body {
  background: #000;
  color: #00ff88;
  font-family: Arial;
  text-align: center;
  margin: 0;
}

.box {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

#reader {
  width: 280px;
  margin: auto;
}

.display {
  background: #000;
  border: 3px solid #00ff88;
  padding: 20px;
  border-radius: 12px;
  margin: 15px 0;
  font-size: 28px;
  min-height: 120px;
}

input {
  width: 100%;
  padding: 20px;
  font-size: 26px;
  text-align: center;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 20px;
  margin-top: 10px;
  font-size: 22px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.green { background: #00ff88; color: black; }
.blue { background: #2563eb; color: white; }
.gray { background: #333; color: white; }

</style>
</head>

<body>

<div class="box">

<h1>💳 VALE FEIRA</h1>

<div id="reader"></div>

<div id="tela" class="display">
AGUARDANDO...
</div>

<input type="number" id="valor" placeholder="DIGITE O VALOR">

<button class="blue" onclick="lerServidor()">LER SERVIDOR</button>
<button class="gray" onclick="lerFeirante()">LER FEIRANTE</button>
<button class="green" onclick="pagar()">CONFIRMAR</button>
<button class="gray" onclick="extrato()">EXTRATO</button>

</div>

<script>

// 🔗 COLE SUA URL AQUI
const URL = "https://script.google.com/macros/s/AKfycbyjqDoYn7z7-twvHfbdt7cVUgMiYaWbbA_dlK7c3RzTHd6CBUrS1J7wXaNKQB9goSfG/exec";

let servidor = "";
let feirante = "";
let senha = "";

// =========================
// LER SERVIDOR
// =========================
function lerServidor() {

  scan((codigo) => {

    servidor = codigo;

    fetch(`${URL}?servidor=${codigo}&consultar=1`)
    .then(r => r.json())
    .then(d => {

      if (d.erro) {
        tela("ERRO");
        return;
      }

      tela(`
        ${d.nome}<br>
        ${d.secretaria}<br>
        SALDO: R$ ${d.saldo.toFixed(2)}
      `);

    });

  });
}

// =========================
// LER FEIRANTE
// =========================
function lerFeirante() {

  scan((codigo) => {
    feirante = codigo;
    senha = prompt("SENHA:");
    tela("FEIRANTE OK");
  });

}

// =========================
// PAGAR
// =========================
function pagar() {

  let valor = document.getElementById("valor").value;

  fetch(`${URL}?servidor=${servidor}&feirante=${feirante}&valor=${valor}&senha=${senha}`)
  .then(r => r.json())
  .then(d => {

    if (d.erro) {
      tela("ERRO: " + d.erro);
      return;
    }

    tela(`PAGO<br>SALDO: R$ ${d.saldo.toFixed(2)}`);

  });

}

// =========================
// EXTRATO
// =========================
function extrato() {

  if (!feirante) {
    alert("Leia o feirante");
    return;
  }

  fetch(`${URL}?feirante=${feirante}&senha=${senha}&extrato=1`)
  .then(r => r.json())
  .then(d => {

    if (d.erro) {
      tela(d.erro);
      return;
    }

    let html = "VENDAS:<br><br>";

    d.extrato.forEach(e => {
      html += `R$ ${e.valor}<br>`;
    });

    html += `<br>TOTAL: R$ ${d.totalHoje.toFixed(2)}`;

    tela(html);

  });

}

// =========================
// SCANNER
// =========================
function scan(callback) {

  document.getElementById("reader").innerHTML = "";

  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 220 },
    (text) => {
      qr.stop();
      callback(text);
    }
  );
}

// =========================
// TELA
// =========================
function tela(msg) {
  document.getElementById("tela").innerHTML = msg;
}

</script>

</body>
</html>
