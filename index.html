<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vale Feira</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.container {
  padding:20px;
}

button {
  width:100%;
  padding:18px;
  margin:10px 0;
  border:none;
  border-radius:12px;
  font-size:18px;
  color:white;
}

.btn1 { background:#2563eb; }
.btn2 { background:#7c3aed; }
.btn3 { background:#16a34a; }

.card {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-top:15px;
}

#reader {
  width:100%;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>💳 Vale Feira</h2>

<button class="btn1" onclick="startScan('servidor')">📷 Ler Servidor</button>
<button class="btn2" onclick="startScan('feirante')">📷 Ler Feirante</button>

<div id="reader"></div>

<div class="card">
  <h3 id="nome">Nenhum servidor</h3>
  <h1 id="saldo">R$ 0,00</h1>
</div>

<div class="card">
  <input id="valor" placeholder="Valor (R$)">
  <input id="feirante" placeholder="Feirante">
  <button class="btn3" onclick="pagar()">💰 Confirmar</button>
</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwIUVTx29ykJ1O4r-Iqmg-5tpTZpbgFgODti8bceF5_CrrxfjKN9ZzxP8NDiNkj4HnD/exec";

let servidor = "";
let scanner;

// 📷 iniciar câmera
function startScan(tipo) {

  document.getElementById("reader").innerHTML = "";

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" }, // 🔥 câmera traseira
    { fps: 10, qrbox: 250 },
    (decodedText) => {

      scanner.stop();

      if (tipo === "servidor") {
        servidor = decodedText;
        consultar();
      } else {
        document.getElementById("feirante").value = decodedText;
      }

    }
  );
}

// 🔎 consulta saldo
function consultar() {

  fetch(`${URL}?servidor=${servidor}`)
  .then(r => r.json())
  .then(d => {

    if(d.erro){
      alert(d.erro);
      return;
    }

    document.getElementById("nome").innerText = d.nome;
    document.getElementById("saldo").innerText = "R$ " + d.saldo;

  });
}

// 💰 pagamento
function pagar() {

  let valor = document.getElementById("valor").value;
  let feirante = document.getElementById("feirante").value;

  fetch(`${URL}?servidor=${servidor}&valor=${valor}&feirante=${feirante}`)
  .then(r => r.json())
  .then(d => {

    if(d.erro){
      alert(d.erro);
      return;
    }

    alert("Pagamento realizado!");
    consultar();

  });
}

</script>

</body>
</html>
