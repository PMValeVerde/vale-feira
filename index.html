<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Vale Feira</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
}

.container {
  padding: 20px;
}

h1 {
  color: #22c55e;
}

button {
  padding: 15px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.btn-servidor { background: #2563eb; color: white; }
.btn-feirante { background: #16a34a; color: white; }
.btn-pagar { background: #22c55e; color: white; width: 100%; }

input {
  padding: 12px;
  margin: 5px;
  width: 90%;
  border-radius: 8px;
  border: none;
}

#reader {
  width: 300px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
}

</style>
</head>

<body>

<div class="container">

<h1>💳 Vale Feira</h1>

<button class="btn-servidor" onclick="lerServidor()">📷 Ler Servidor</button>
<button class="btn-feirante" onclick="lerFeirante()">🧑‍🌾 Ler Feirante</button>

<div id="reader"></div>

<div id="info" class="card"></div>

<input type="number" id="valor" placeholder="Valor da compra">

<button class="btn-pagar" onclick="pagar()">💰 Pagar</button>

<div id="resultado" class="card"></div>

<button class="btn-feirante" onclick="verExtrato()">📄 Ver Extrato</button>

<div id="extrato" class="card"></div>

</div>

<script>

// 🔗 COLE AQUI SUA URL DO APPS SCRIPT
const URL = "https://script.google.com/macros/s/AKfycbwWQELBhmspZR5uvq4MJWxzLX2IfhnM0bd-RiMHisuGecvZgC3wbISVolsSm8wa6gaJ/exec";

// VARIÁVEIS
let codigoServidor = "";
let codigoFeirante = "";
let senhaFeirante = "";

// =========================
// 📷 LEITOR QR SERVIDOR
// =========================
function lerServidor() {
  iniciarLeitor((codigo) => {
    codigoServidor = codigo;

    fetch(`${URL}?servidor=${codigo}&consultar=1`)
    .then(r => r.json())
    .then(d => {

      if (d.erro) {
        alert(d.erro);
        return;
      }

      document.getElementById("info").innerHTML = `
        <h3>${d.nome}</h3>
        <p>${d.secretaria}</p>
        <p>💰 Saldo: R$ ${d.saldo.toFixed(2)}</p>
      `;
    });
  });
}

// =========================
// 📷 LEITOR QR FEIRANTE
// =========================
function lerFeirante() {
  iniciarLeitor((codigo) => {
    codigoFeirante = codigo;
    senhaFeirante = prompt("Digite a senha do feirante:");
  });
}

// =========================
// 💰 PAGAMENTO
// =========================
function pagar() {

  let valor = document.getElementById("valor").value;

  fetch(`${URL}?servidor=${codigoServidor}&feirante=${codigoFeirante}&valor=${valor}&senha=${senhaFeirante}`)
  .then(r => r.json())
  .then(d => {

    if (d.erro) {
      document.getElementById("resultado").innerHTML = "❌ " + d.erro;
      return;
    }

    document.getElementById("resultado").innerHTML =
      `✅ Pagamento realizado<br>Saldo restante: R$ ${d.saldo.toFixed(2)}`;
  });
}

// =========================
// 📄 EXTRATO
// =========================
function verExtrato() {

  fetch(`${URL}?feirante=${codigoFeirante}&senha=${senhaFeirante}&extrato=1`)
  .then(r => r.json())
  .then(d => {

    if (d.erro) {
      alert(d.erro);
      return;
    }

    let html = "<h3>Extrato</h3>";

    d.extrato.forEach(e => {
      html += `<p>${e.data} - ${e.servidor} - R$ ${e.valor}</p>`;
    });

    html += `<hr><strong>💰 Total do dia: R$ ${d.totalHoje.toFixed(2)}</strong>`;

    document.getElementById("extrato").innerHTML = html;
  });
}

// =========================
// 📷 FUNÇÃO LEITOR
// =========================
function iniciarLeitor(callback) {

  document.getElementById("reader").innerHTML = "";

  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      html5QrCode.stop();
      callback(decodedText);
    }
  );
}

</script>

</body>
</html>
