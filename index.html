<!DOCTYPE html>
<html>
<head>
  <title>Vale Feira</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: Arial; text-align: center; }
    #reader { width: 300px; margin: auto; }
    input, button { padding: 10px; margin: 5px; width: 200px; }
  </style>
</head>
<body>

<h2>💳 Vale Feira</h2>

<div id="reader"></div>

<p id="nome"></p>
<p id="saldo"></p>

<input type="number" id="valor" placeholder="Valor (R$)">
<input type="text" id="feirante" placeholder="Nome do feirante">

<br>
<button onclick="pagar()">Confirmar Pagamento</button>

<p id="msg"></p>

<script>

let servidor = "";
const API = "COLE_SUA_URL_AQUI";

function onScanSuccess(decodedText) {

  servidor = decodedText;

  document.getElementById("msg").innerText = "Consultando...";

  fetch(API + "?servidor=" + encodeURIComponent(servidor))
    .then(r => r.json())
    .then(data => {

      if (data.erro) {
        document.getElementById("msg").innerText = data.erro;
        return;
      }

      document.getElementById("nome").innerText = "👤 " + data.nome;
      document.getElementById("saldo").innerText = "💰 Saldo: R$ " + data.saldo;
      document.getElementById("msg").innerText = "Pronto para pagamento";

    });
}

function pagar() {

  let valor = document.getElementById("valor").value;
  let feirante = document.getElementById("feirante").value;

  if (!servidor) {
    alert("Leia o QR Code primeiro");
    return;
  }

  fetch(API + "?servidor=" + servidor +
        "&valor=" + valor +
        "&feirante=" + encodeURIComponent(feirante))
    .then(r => r.json())
    .then(data => {

      if (data.erro) {
        document.getElementById("msg").innerText = data.erro;
        return;
      }

      document.getElementById("saldo").innerText = "💰 Novo saldo: R$ " + data.saldo;
      document.getElementById("msg").innerText = "✅ Pagamento realizado";

    });
}

const html5QrCode = new Html5Qrcode("reader");
html5QrCode.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  onScanSuccess
);

</script>

</body>
</html>
