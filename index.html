<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vale Feira</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

#reader {
  width: 300px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

input, button {
  padding: 12px;
  margin: 5px;
  width: 80%;
  font-size: 16px;
}

button {
  background: green;
  color: white;
  border: none;
  border-radius: 5px;
}

#msg {
  font-weight: bold;
}
</style>

</head>

<body>

<h2>💳 Vale Feira</h2>

<div id="reader"></div>

<div class="card">
  <p id="nome"></p>
  <p id="saldo"></p>
</div>

<input type="number" id="valor" placeholder="Valor R$">
<input type="text" id="feirante" placeholder="Nome do feirante">

<br>
<button onclick="pagar()">CONFIRMAR PAGAMENTO</button>

<p id="msg"></p>

<audio id="ok" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="erro" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

const API = "COLE_SUA_URL_AQUI";

let servidor = "";
let processando = false;

function somOK() {
  document.getElementById("ok").play();
}

function somErro() {
  document.getElementById("erro").play();
}

function setMsg(msg, cor="black") {
  let el = document.getElementById("msg");
  el.innerText = msg;
  el.style.color = cor;
}

function onScanSuccess(decodedText) {

  if (processando) return;

  servidor = decodedText;

  setMsg("Consultando...", "blue");

  fetch(API + "?servidor=" + encodeURIComponent(servidor))
    .then(r => r.json())
    .then(data => {

      if (data.erro) {
        setMsg(data.erro, "red");
        somErro();
        return;
      }

      document.getElementById("nome").innerText = "👤 " + data.nome;
      document.getElementById("saldo").innerText = "💰 Saldo: R$ " + data.saldo;

      setMsg("Pronto para pagamento", "green");
      somOK();

    })
    .catch(() => {
      setMsg("Erro de conexão", "red");
      somErro();
    });
}

function pagar() {

  if (processando) return;

  let valor = document.getElementById("valor").value;
  let feirante = document.getElementById("feirante").value;

  if (!servidor) {
    alert("Leia o QR primeiro");
    return;
  }

  if (!valor || valor <= 0) {
    alert("Informe o valor");
    return;
  }

  processando = true;

  setMsg("Processando...", "blue");

  fetch(API + "?servidor=" + servidor +
        "&valor=" + valor +
        "&feirante=" + encodeURIComponent(feirante))
    .then(r => r.json())
    .then(data => {

      processando = false;

      if (data.erro) {
        setMsg(data.erro, "red");
        somErro();
        return;
      }

      document.getElementById("saldo").innerText = "💰 Novo saldo: R$ " + data.saldo;

      setMsg("✅ Pagamento realizado", "green");
      somOK();

    })
    .catch(() => {
      processando = false;
      setMsg("Erro ao processar", "red");
      somErro();
    });
}

function iniciarCamera() {

  Html5Qrcode.getCameras().then(cameras => {

    let traseira = cameras.find(c => c.label.toLowerCase().includes("back"));

    let cameraId = traseira ? traseira.id : cameras[0].id;

    const qr = new Html5Qrcode("reader");

    qr.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );

  }).catch(() => {
    setMsg("Erro ao abrir câmera", "red");
  });
}

iniciarCamera();

</script>

</body>
</html>
