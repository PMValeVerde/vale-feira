<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vale Feira</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  background: #f3f4f6;
  text-align: center;
  margin: 0;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

#reader {
  width: 100%;
  border-radius: 10px;
  overflow: hidden;
}

input {
  width: 90%;
  padding: 12px;
  margin: 8px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 90%;
  padding: 14px;
  margin: 8px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.btn1 { background: #2563eb; color: white; }
.btn2 { background: #9333ea; color: white; }
.btn3 { background: #16a34a; color: white; }

#msg {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>💳 Vale Feira</h1>

<div id="reader"></div>

<button class="btn1" onclick="lerServidor()">📷 Ler Servidor</button>
<button class="btn2" onclick="lerFeirante()">📷 Ler Feirante</button>

<input type="number" id="valor" placeholder="Valor (R$)">
<input type="text" id="feirante" placeholder="Nome do feirante" readonly>

<button class="btn3" onclick="pagar()">💰 Confirmar Pagamento</button>

<div id="msg"></div>

</div>

<script>

// 🔗 COLE AQUI SUA URL DO APPS SCRIPT
const API = "https://script.google.com/macros/s/AKfycbyJCYnf7AmIcu48kNYum37p4h0fcCy23lh16X1PHfTI4mq8ErulRSV1fOWs164JReFz/exec";

// variáveis
let lendo = "";
let servidor = "";

// leitor QR
let scanner = new Html5Qrcode("reader");

function iniciarLeitor() {

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    qr => {

      if (lendo === "servidor") {
        servidor = qr;
        setMsg("Servidor lido ✅", "#2563eb");
        buscarServidor(qr);
      }

      if (lendo === "feirante") {
        document.getElementById("feirante").value = qr;
        setMsg("Feirante lido ✅", "#9333ea");
      }

      scanner.stop();

    }
  );
}

// botões
function lerServidor() {
  lendo = "servidor";
  setMsg("Aponte para o QR do servidor...");
  iniciarLeitor();
}

function lerFeirante() {
  lendo = "feirante";
  setMsg("Aponte para o QR do feirante...");
  iniciarLeitor();
}

// consulta servidor
function buscarServidor(cod) {

  fetch(API + "?servidor=" + cod)
    .then(r => r.json())
    .then(data => {

      if (data.erro) {
        setMsg(data.erro, "red");
        return;
      }

      setMsg("👤 " + data.nome + " | Saldo: R$ " + data.saldo, "#16a34a");

    });
}

// pagamento (rápido)
function pagar() {

  let valor = document.getElementById("valor").value;
  let feirante = document.getElementById("feirante").value;

  if (!servidor) return alert("Leia o QR do servidor");
  if (!feirante) return alert("Leia o QR do feirante");
  if (!valor || valor <= 0) return alert("Informe o valor");

  // ⚡ resposta imediata
  setMsg("Processando pagamento...", "#16a34a");

  document.getElementById("valor").value = "";

  fetch(API + "?servidor=" + servidor +
        "&valor=" + valor +
        "&feirante=" + encodeURIComponent(feirante))
    .then(r => r.json())
    .then(data => {

      if (data.erro) {
        setMsg(data.erro, "red");
        return;
      }

      setMsg("✅ Pago! Saldo: R$ " + data.saldo, "#16a34a");

    })
    .catch(() => {
      setMsg("Erro na conexão", "red");
    });
}

// mensagem
function setMsg(texto, cor="black") {
  let msg = document.getElementById("msg");
  msg.innerText = texto;
  msg.style.color = cor;
}

</script>

</body>
</html>
</script>

</body>
</html>
