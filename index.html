<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Vale Feira</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}

.box {
  max-width: 320px;
  margin: auto;
  padding: 20px;
}

h2 {
  color: #22c55e;
}

#reader {
  width: 250px;
  margin: auto;
}

.display {
  background: #000;
  padding: 15px;
  border-radius: 10px;
  margin: 10px 0;
  min-height: 80px;
}

input {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  text-align: center;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.green { background: #22c55e; color: black; }
.blue { background: #3b82f6; color: white; }
.gray { background: #444; color: white; }

</style>
</head>

<body>

<div class="box">

<h2>💳 Vale Feira</h2>

<div id="reader"></div>

<div class="display" id="tela">
Aguardando leitura...
</div>

<input type="number" id="valor" placeholder="R$ 0,00">

<button class="blue" onclick="lerServidor()">📷 Ler Servidor</button>
<button class="gray" onclick="lerFeirante()">🧑‍🌾 Ler Feirante</button>
<button class="green" onclick="pagar()">💰 Confirmar</button>
<button class="gray" onclick="extrato()">📄 Extrato</button>

</div>

<script>

// 🔗 SUA URL
const URL = "https://script.google.com/macros/s/AKfycbyjqDoYn7z7-twvHfbdt7cVUgMiYaWbbA_dlK7c3RzTHd6CBUrS1J7wXaNKQB9goSfG/exec";

let servidor = "";
let feirante = "";
let senha = "";

// =========================
// 📷 LER SERVIDOR
// =========================
function lerServidor() {
  scan((codigo) => {

    servidor = codigo;

    fetch(`${URL}?servidor=${codigo}&consultar=1`)
    .then(r => r.json())
    .then(d => {

      if (d.erro) {
        tela(d.erro);
        return;
      }

      tela(`
        👤 ${d.nome}<br>
        🏢 ${d.secretaria}<br>
        💰 Saldo: R$ ${d.saldo.toFixed(2)}
      `);
    });

  });
}

// =========================
// 📷 LER FEIRANTE
// =========================
function lerFeirante() {
  scan((codigo) => {
    feirante = codigo;
    senha = prompt("Senha do feirante:");
    tela("Feirante identificado ✅");
  });
}

// =========================
// 💰 PAGAR
// =========================
function pagar() {

  let valor = document.getElementById("valor").value;

  fetch(`${URL}?servidor=${servidor}&feirante=${feirante}&valor=${valor}&senha=${senha}`)
  .then(r => r.json())
  .then(d => {

    if (d.erro) {
      tela("❌ " + d.erro);
      return;
    }

    tela(`✅ Pago<br>Saldo: R$ ${d.saldo.toFixed(2)}`);
  });
}

// =========================
// 📄 EXTRATO (CORRIGIDO)
// =========================
function extrato() {

  if (!feirante) {
    alert("Leia o QR do feirante primeiro!");
    return;
  }

  fetch(`${URL}?feirante=${feirante}&senha=${senha}&extrato=1`)
  .then(r => r.json())
  .then(d => {

    if (d.erro) {
      tela(d.erro);
      return;
    }

    let html = "📄 Últimas vendas:<br><br>";

    d.extrato.forEach(e => {
      html += `${e.data} - R$ ${e.valor}<br>`;
    });

    html += `<br>💰 Total hoje: R$ ${d.totalHoje.toFixed(2)}`;

    tela(html);
  });
}

// =========================
// 📷 SCANNER
// =========================
function scan(callback) {

  document.getElementById("reader").innerHTML = "";

  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 200 },
    (text) => {
      qr.stop();
      callback(text);
    }
  );
}

// =========================
// 📺 DISPLAY
// =========================
function tela(msg) {
  document.getElementById("tela").innerHTML = msg;
}

</script>

</body>
</html>
