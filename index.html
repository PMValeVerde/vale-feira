<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Vale Feira</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
}

.container {
  padding: 20px;
}

h1 {
  color: #22c55e;
}

button {
  padding: 15px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.btn-servidor { background: #2563eb; color: white; }
.btn-feirante { background: #16a34a; color: white; }
.btn-pagar { background: #22c55e; color: white; width: 100%; }

input {
  padding: 12px;
  margin: 5px;
  width: 90%;
  border-radius: 8px;
  border: none;
}

#reader {
  width: 300px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<h1>рџ’і Vale Feira</h1>

<button class="btn-servidor" onclick="lerServidor()">рџ“· Ler Servidor</button>
<button class="btn-feirante" onclick="lerFeirante()">рџ§‘вЂЌрџЊѕ Ler Feirante</button>

<div id="reader"></div>

<div id="info" class="card"></div>

<input type="number" id="valor" placeholder="Valor da compra">

<button class="btn-pagar" onclick="pagar()">рџ’° Pagar</button>

<div id="resultado" class="card"></div>

<button class="btn-feirante" onclick="verExtrato()">рџ“„ Ver Extrato</button>

<div id="extrato" class="card"></div>

</div>

<script>

// рџ”— SUA URL (jГЎ estГЎ certa)
const URL = "https://script.google.com/macros/s/AKfycbwlhLik8f5l73a1CYuGMjO-ZqR-zVpO_SuVGyu_4hxrg6xVJjfRzncjMh-yuH-o5QPj/exec";

// VARIГЃVEIS
let codigoServidor = "";
let nomeServidor = "";
let codigoFeirante = "";
let senhaFeirante = "";

// =========================
// рџ”Ћ EXTRAI NOME DO QR
// =========================
function extrairNome(codigo) {
  return codigo.split("-").slice(4).join(" ");
}

// =========================
// рџ“· LEITOR QR SERVIDOR
// =========================
function lerServidor() {
  iniciarLeitor((codigo) => {

    codigoServidor = codigo;
    nomeServidor = extrairNome(codigo);

    fetch(`${URL}?servidor=${encodeURIComponent(nomeServidor)}&consultar=1`)
    .then(r => r.json())
    .then(d => {

      if (d.erro) {
        alert(d.erro);
        return;
      }

      document.getElementById("info").innerHTML = `
        <h3>${d.nome}</h3>
        <p>${d.secretaria}</p>
        <p>рџ’° Saldo: R$ ${d.saldo.toFixed(2)}</p>
      `;
    });
  });
}

// =========================
// рџ“· LEITOR QR FEIRANTE
// =========================
function lerFeirante() {
  iniciarLeitor((codigo) => {
    codigoFeirante = codigo;
    senhaFeirante = prompt("Digite a senha do feirante:");
  });
}

// =========================
// рџ’° PAGAMENTO
// =========================
function pagar() {

  let valor = document.getElementById("valor").value;

  if (!nomeServidor) {
    alert("Leia o QR do servidor primeiro");
    return;
  }

  if (!codigoFeirante) {
    alert("Leia o QR do feirante");
    return;
  }

  fetch(`${URL}?servidor=${encodeURIComponent(nomeServidor)}&feirante=${codigoFeirante}&valor=${valor}&senha=${senhaFeirante}`)
  .then(r => r.json())
  .then(d => {

    if (d.erro) {
      document.getElementById("resultado").innerHTML = "вќЊ " + d.erro;
      return;
    }

    document.getElementById("resultado").innerHTML =
      `вњ… Pagamento realizado<br>Saldo restante: R$ ${d.saldo.toFixed(2)}`;

  });
}

// =========================
// рџ“„ EXTRATO
// =========================
function verExtrato() {

  fetch(`${URL}?feirante=${codigoFeirante}&senha=${senhaFeirante}&extrato=1`)
  .then(r => r.json())
  .then(d => {

    if (d.erro) {
      alert(d.erro);
      return;
    }

    let html = "<h3>Extrato</h3>";

    d.extrato.forEach(e => {
      html += `<p>${e.data} - ${e.servidor} - R$ ${e.valor}</p>`;
    });

    html += `<hr><strong>рџ’° Total do dia: R$ ${d.totalHoje.toFixed(2)}</strong>`;

    document.getElementById("extrato").innerHTML = html;
  });
}

// =========================
// рџ“· FUNГ‡ГѓO LEITOR
// =========================
function iniciarLeitor(callback) {

  document.getElementById("reader").innerHTML = "";

  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      html5QrCode.stop();
      callback(decodedText);
    }
  );
}

</script>

</body>
</html>
