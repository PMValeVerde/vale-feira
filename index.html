<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vale Feira</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  color: black;
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
  text-align: center;
  margin-bottom: 15px;
}

#reader {
  width: 100%;
  border-radius: 12px;
  overflow: hidden;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.btn-servidor { background: #2563eb; color: white; }
.btn-feirante { background: #9333ea; color: white; }
.btn-pagar { background: #16a34a; color: white; }

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
}

.saldo {
  font-size: 22px;
  font-weight: bold;
  text-align: center;
  margin-top: 10px;
}

.nome {
  text-align: center;
  font-size: 16px;
}

#msg {
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>💳 Vale Feira</h1>

<div class="card">
  <div id="reader"></div>

  <button class="btn-servidor" onclick="lerServidor()">📷 Ler Servidor</button>
  <button class="btn-feirante" onclick="lerFeirante()">📷 Ler Feirante</button>
</div>

<div class="card">
  <div class="nome" id="nome">Nenhum servidor</div>
  <div class="saldo" id="saldo">R$ 0,00</div>
</div>

<div class="card">
  <input type="number" id="valor" placeholder="Valor (R$)">
  <input type="text" id="feirante" placeholder="Feirante" readonly>

  <button class="btn-pagar" onclick="pagar()">💰 Confirmar Pagamento</button>
</div>

<div id="msg"></div>

</div>

<script>

// 🔗 COLE SUA URL DO APPS SCRIPT
const API = "https://script.google.com/macros/s/AKfycbyJCYnf7AmIcu48kNYum37p4h0fcCy23lh16X1PHfTI4mq8ErulRSV1fOWs164JReFz/exec";

let scanner = new Html5Qrcode("reader");
let lendo = "";
let servidor = "";

// iniciar câmera
function iniciar() {

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    qr => {

      if (lendo === "servidor") {
        servidor = qr;
        buscarServidor(qr);
      }

      if (lendo === "feirante") {
        document.getElementById("feirante").value = qr;
        setMsg("Feirante lido", "#9333ea");
      }

      scanner.stop();
    }
  );
}

// botões
function lerServidor() {
  lendo = "servidor";
  setMsg("Lendo servidor...");
  iniciar();
}

function lerFeirante() {
  lendo = "feirante";
  setMsg("Lendo feirante...");
  iniciar();
}

// busca dados
function buscarServidor(cod) {

  fetch(API + "?servidor=" + cod)
    .then(r => r.json())
    .then(data => {

      if (data.erro) {
        setMsg(data.erro, "red");
        return;
      }

      document.getElementById("nome").innerText = data.nome;
      document.getElementById("saldo").innerText = "R$ " + data.saldo;

      setMsg("Servidor carregado", "#16a34a");
    });
}

// pagamento
function pagar() {

  let valor = document.getElementById("valor").value;
  let feirante = document.getElementById("feirante").value;

  if (!servidor) return alert("Leia o servidor");
  if (!feirante) return alert("Leia o feirante");
  if (!valor) return alert("Informe valor");

  // resposta imediata
  setMsg("Processando...", "#16a34a");

  document.getElementById("valor").value = "";

  fetch(API + "?servidor=" + servidor +
        "&valor=" + valor +
        "&feirante=" + encodeURIComponent(feirante))
    .then(r => r.json())
    .then(data => {

      if (data.erro) {
        setMsg(data.erro, "red");
        return;
      }

      document.getElementById("saldo").innerText = "R$ " + data.saldo;

      setMsg("✅ Pagamento realizado!", "#16a34a");

    })
    .catch(() => {
      setMsg("Erro na conexão", "red");
    });
}

// mensagem
function setMsg(txt, cor="white") {
  let m = document.getElementById("msg");
  m.innerText = txt;
  m.style.color = cor;
}

</script>

</body>
</html>
