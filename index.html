<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vale Feira</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.btn {
  background: #22c55e;
  color: white;
}

.btn-sec {
  background: #3b82f6;
  color: white;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  font-size: 16px;
}

#reader {
  margin-top: 15px;
}
</style>
</head>

<body>

<h2>💳 Vale Feira</h2>

<div class="card">
  <h3>Servidor</h3>
  <button onclick="lerServidor()">📷 Ler QR Servidor</button>
  <p id="servidor"></p>
</div>

<div class="card">
  <h3>Feirante</h3>
  <button onclick="lerFeirante()">📷 Ler QR Feirante</button>
  <p id="feirante"></p>

  <input type="password" id="senha" placeholder="Senha do feirante">
</div>

<div class="card">
  <h3>Valor</h3>
  <input type="number" id="valor" placeholder="Valor da compra">
</div>

<div class="card">
  <button class="btn" onclick="pagar()">💰 Pagar</button>
  <button class="btn-sec" onclick="verExtrato()">📄 Ver Extrato</button>
</div>

<div id="reader"></div>

<div class="card">
  <h3>Resultado</h3>
  <pre id="resultado"></pre>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyTgGevWVwyvuZoDT3Dm2x62RLx4s5jS2MURnHViy2wKUcbpF5KkzPRroOtZ6lMtq4P/exec";

let servidor = "";
let feirante = "";
let leitor;

function iniciarScanner(callback) {
  document.getElementById("reader").innerHTML = "";
  leitor = new Html5Qrcode("reader");

  leitor.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      leitor.stop();
      callback(decodedText);
    }
  );
}

function lerServidor() {
  iniciarScanner((texto) => {
    servidor = texto.trim();
    document.getElementById("servidor").innerText = servidor;
  });
}

function lerFeirante() {
  iniciarScanner((texto) => {
    feirante = texto.trim();
    document.getElementById("feirante").innerText = feirante;
  });
}

async function pagar() {
  const valor = document.getElementById("valor").value;
  const senha = document.getElementById("senha").value;

  if (!servidor || !feirante || !valor || !senha) {
    alert("Preencha tudo");
    return;
  }

  const url = `${API_URL}?servidor=${servidor}&feirante=${feirante}&valor=${valor}&senha=${senha}`;

  document.getElementById("resultado").innerText = "Processando...";

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (data.erro) {
      document.getElementById("resultado").innerText = "❌ " + data.erro;
    } else {
      document.getElementById("resultado").innerText =
        "✅ Pagamento realizado\nSaldo: R$ " + data.saldo;
    }

  } catch (e) {
    document.getElementById("resultado").innerText = "Erro de conexão";
  }
}

async function verExtrato() {
  const senha = document.getElementById("senha").value;

  if (!feirante || !senha) {
    alert("Informe feirante e senha");
    return;
  }

  const url = `${API_URL}?feirante=${feirante}&senha=${senha}&extrato=1`;

  document.getElementById("resultado").innerText = "Buscando extrato...";

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (data.erro) {
      document.getElementById("resultado").innerText = "❌ " + data.erro;
      return;
    }

    let texto = "📄 EXTRATO:\n\n";

    data.extrato.forEach(item => {
      texto += `${item.data}\n${item.servidor} - R$ ${item.valor}\n\n`;
    });

    document.getElementById("resultado").innerText = texto;

  } catch (e) {
    document.getElementById("resultado").innerText = "Erro ao buscar extrato";
  }
}
</script>

</body>
</html>
