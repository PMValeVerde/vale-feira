<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vale Feira</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.container {
  padding:20px;
}

button {
  width:100%;
  padding:18px;
  margin:10px 0;
  border:none;
  border-radius:12px;
  font-size:18px;
  color:white;
}

.btn1 { background:#2563eb; }
.btn2 { background:#7c3aed; }
.btn3 { background:#16a34a; }

.card {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-top:15px;
}

#reader {
  width:100%;
  margin-top:10px;
  .valor:focus {
  outline: none;
  box-shadow: 0 0 10px #22c55e;
}
  .valor {
  font-size: 28px;
  padding: 20px;
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>💳 Vale Feira</h2>

<button class="btn1" onclick="startScan('servidor')">📷 Ler Servidor</button>
<button class="btn2" onclick="startScan('feirante')">📷 Ler Feirante</button>

<div id="reader"></div>

<div class="card">
  <h3 id="nome">Nenhum servidor</h3>
  <h1 id="saldo">R$ 0,00</h1>
</div>

<div class="card">
  <input id="valor" type="number" step="0.01" placeholder="0,00" class="valor">
  <input id="feirante" placeholder="Feirante" readonly>
  <button class="btn3" onclick="pagar()">💰 Confirmar</button>
</div>

<!-- ✅ EXTRATO -->
<button class="btn2" onclick="verExtrato()">📄 Ver Extrato</button>

<div id="extrato" class="card"></div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwASFPgI7QYP7QRsx98HI-x_1A1TOUhNpkrsqgN49mpCx4y7xmhkZS6wBcxPGYi1o8f/exec";

let codigoServidor = "";
let nomeServidor = "";
let codigoFeirante = "";
let senhaFeirante = "";
let scanner;

// 🔎 extrair nome do QR
function extrairNome(codigo) {
  return codigo.split("-").slice(4).join(" ");
}

// 📷 iniciar câmera
function startScan(tipo) {

  document.getElementById("reader").innerHTML = "";

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {

      scanner.stop();

      if (tipo === "servidor") {
        codigoServidor = decodedText;
        nomeServidor = extrairNome(decodedText);
        consultar();
      } else {
        codigoFeirante = decodedText;
        document.getElementById("feirante").value = decodedText;
        senhaFeirante = prompt("Digite a senha do feirante:");
      }

    }
  );
}

// 🔎 consulta saldo
function consultar() {

  fetch(`${URL}?servidor=${encodeURIComponent(nomeServidor)}&consultar=1`)
  .then(r => r.json())
  .then(d => {

    if(d.erro){
      alert(d.erro);
      return;
    }

    document.getElementById("nome").innerText = d.nome;
    document.getElementById("saldo").innerText = "R$ " + d.saldo.toFixed(2);

  });
}

// 💰 pagamento
function pagar() {

  let valor = document.getElementById("valor").value;

  if (!nomeServidor) {
    alert("Leia o QR do servidor");
    return;
  }

  if (!codigoFeirante) {
    alert("Leia o QR do feirante");
    return;
  }

  fetch(`${URL}?servidor=${encodeURIComponent(nomeServidor)}&valor=${valor}&feirante=${codigoFeirante}&senha=${senhaFeirante}`)
  .then(r => r.json())
  .then(d => {

    if(d.erro){
      alert(d.erro);
      return;
    }

    alert("Pagamento realizado!");
    consultar();

  });
}

// 📄 EXTRATO DO FEIRANTE
function verExtrato() {

  if (!codigoFeirante) {
    alert("Leia o QR do feirante primeiro");
    return;
  }

  fetch(`${URL}?feirante=${codigoFeirante}&senha=${senhaFeirante}&extrato=1`)
  .then(r => r.json())
  .then(d => {

    if (d.erro) {
      alert(d.erro);
      return;
    }

    let html = "<h3>📄 Extrato</h3>";

    d.extrato.forEach(e => {
      html += `<p>${e.data} - ${e.servidor} - R$ ${e.valor.toFixed(2)}</p>`;
    });

    html += `<hr><strong>💰 Total do dia: R$ ${d.totalHoje.toFixed(2)}</strong>`;

    document.getElementById("extrato").innerHTML = html;

  });
}

</script>

</body>
</html>
