<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vale Feira</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  background: #16a34a;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

#reader {
  width: 100%;
  max-width: 350px;
  margin: 15px auto;
  border-radius: 10px;
  overflow: hidden;
}

.card {
  background: #1e293b;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.nome {
  font-size: 18px;
  font-weight: bold;
}

.saldo {
  font-size: 26px;
  color: #22c55e;
  margin-top: 5px;
}

input {
  width: 90%;
  padding: 14px;
  margin: 8px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

button {
  width: 90%;
  padding: 16px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  font-size: 18px;
  background: #22c55e;
  color: white;
  font-weight: bold;
}

button:active {
  background: #15803d;
}

#msg {
  text-align: center;
  margin: 10px;
  font-weight: bold;
}

</style>
</head>

<body>

<header>💳 Vale Feira</header>

<div id="reader"></div>

<div class="card">
  <div class="nome" id="nome">Aguardando leitura...</div>
  <div class="saldo" id="saldo"></div>
</div>

<input type="number" id="valor" placeholder="💰 Valor (R$)">
<input type="text" id="feirante" placeholder="🏪 Nome do feirante">

<button onclick="pagar()">CONFIRMAR PAGAMENTO</button>

<div id="msg"></div>

<audio id="ok" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="erro" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

const API = "COLE_SUA_URL_AQUI";

let servidor = "";
let processando = false;

function setMsg(msg, cor="white") {
  let el = document.getElementById("msg");
  el.innerText = msg;
  el.style.color = cor;
}

function somOK() {
  document.getElementById("ok").play();
}

function somErro() {
  document.getElementById("erro").play();
}

function onScanSuccess(decodedText) {

  if (processando) return;

  servidor = decodedText;

  setMsg("Consultando...", "#38bdf8");

  fetch(API + "?servidor=" + encodeURIComponent(servidor))
    .then(r => r.json())
    .then(data => {

      if (data.erro) {
        setMsg(data.erro, "red");
        somErro();
        return;
      }

      document.getElementById("nome").innerText = data.nome;
      document.getElementById("saldo").innerText = "R$ " + data.saldo;

      setMsg("Pronto para pagamento", "#22c55e");
      somOK();

    })
    .catch(() => {
      setMsg("Erro de conexão", "red");
      somErro();
    });
}

function pagar() {

  if (processando) return;

  let valor = document.getElementById("valor").value;
  let feirante = document.getElementById("feirante").value;

  if (!servidor) {
    alert("Leia o QR primeiro");
    return;
  }

  if (!valor || valor <= 0) {
    alert("Informe o valor");
    return;
  }

  processando = true;

  setMsg("Processando...", "#38bdf8");

  fetch(API + "?servidor=" + servidor +
        "&valor=" + valor +
        "&feirante=" + encodeURIComponent(feirante))
    .then(r => r.json())
    .then(data => {

      processando = false;

      if (data.erro) {
        setMsg(data.erro, "red");
        somErro();
        return;
      }

      document.getElementById("saldo").innerText = "R$ " + data.saldo;

      setMsg("✅ Pagamento realizado", "#22c55e");
      somOK();

    })
    .catch(() => {
      processando = false;
      setMsg("Erro ao processar", "red");
      somErro();
    });
}

function iniciarCamera() {

  Html5Qrcode.getCameras().then(cameras => {

    let traseira = cameras.find(c => c.label.toLowerCase().includes("back"));

    let cameraId = traseira ? traseira.id : cameras[0].id;

    const qr = new Html5Qrcode("reader");

    qr.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );

  }).catch(() => {
    setMsg("Erro ao abrir câmera", "red");
  });
}

iniciarCamera();

</script>

</body>
</html>
